<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>
  <dir prefix="xdg">fonts</dir>
  <cachedir>/tmp/fonts-cache</cachedir>
  <config>
    <blank>
      <int>0x0020</int>
      <int>0x00A0</int>
      <int>0x00AD</int>
    </blank>
    <rescan>
      <int>30</int>
    </rescan>
  </config>
</fontconfig>
